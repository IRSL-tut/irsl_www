<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Gamepad ROS Joy Publisher</title>

    <style>
        html {
            height: 100%;
        }

        body {
            height: 100%;
            margin: 0;
        }

        .layout {
            width: 100%;
            height: 100%;
            display: grid;
            grid:
                "header" auto "box" auto "control" auto;
            gap: 8px;
        }

        .header {
            grid-area: header;
            background: rgba(177, 177, 87, 0.1);
        }

        .header h3 {
            padding: 10px;
            margin: 0;
        }

        .box {
            padding: 10px;
            border: 1px solid #ccc;
            margin-top: 10px;
            white-space: pre-wrap;
            background: #f9f9f9;
            margin: 10px;
        }

        .control {
            margin-bottom: 10px;
            margin: 10px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <script src="../ros/rosmain.js"></script>

    <!-- 共通ライブラリ -->
    <script src="./gamepad_ros.js"></script>

    <!-- アプリ本体 -->
    <script defer src="./app.js"></script>
</head>

<body>

    <div class="header" id="header-contents"> </div>
    <h1>🎮 Gamepad → ROS Joy</h1>

    <div class="control">
        送信モード：
        <select id="mode">
            <option value="edge">Edge Trigger</option>
            <option value="periodic">Periodic</option>
        </select>
    </div>

    <div id="status" class="box">未接続</div>

</body>

</html>
